<!DOCTYPE html>
<html lang="en">

<head>
    <title>Memo Mate</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link type="text/css" rel="stylesheet" href="css/crearFlashcard.css" />
</head>

<body>
    <header>
        <nav>
            <img src="images/header.jpeg">
        </nav>
    </header>
    <div class="grid-container">
        <div class="contenedorFormulario">
            <h2>Pregunta: </h2>
            <form class="formulario">
                <textarea id="comentarios" name="comentarios" rows="4" cols="50"></textarea>
            </form>
        </div>
        <div class="contenedorFormulario">
            <h2>Respuesta: </h2>
            <form class="formulario">
                <textarea id="comentarios" name="comentarios" rows="4" cols="50"></textarea>
            </form>
        </div>
        <div class="contenedorFormulario">
            <h2>Imagen Pregunta: </h2>
            <form class="formulario">
                <textarea id="comentarios" name="comentarios" rows="4" cols="50"></textarea>
            </form>
        </div>
        <div class="contenedorFormulario">
            <h2>Imagen respuesta: </h2>
            <form class="formulario">
                <textarea id="comentarios" name="comentarios" rows="4" cols="50"></textarea>
            </form>
        </div>

        <div>
            <h6>Selecciona la dificultad:</h6>
            <form>
                <input type="radio" id="baja" name="dificultad" value="baja">
                <label for="baja">Baja</label>

                <input type="radio" id="media" name="dificultad" value="media">
                <label for="media">Media</label>

                <input type="radio" id="alta" name="dificultad" value="alta">
                <label for="alta">Alta</label>
            </form>

        </div>
    </div>


        <div class="form-buttons">
            <a href="main.html" class="btn-save">
                <button type="submit">Guardar</button>
            </a>
            <a href="main.html" class="btn-cancel">
                <button type="submit">Cancelar</button>
            </a>
        </div>

</body>

</html>
